<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Preenchimento Semanal — Admin</title>
  <link rel="stylesheet" href="shared.css">
  <link rel="stylesheet" href="admin.css">
</head>
<body>

  <!-- ============================================================
       HEADER
  ============================================================ -->
  <header class="site-header">
    <div class="logo">
      <div class="logo-icon admin">
        <svg viewBox="0 0 24 24"><path d="M3 17.25V21h3.75L17.81 9.94l-3.75-3.75L3 17.25zM20.71 7.04a1 1 0 000-1.41l-2.34-2.34a1 1 0 00-1.41 0l-1.83 1.83 3.75 3.75 1.83-1.83z"/></svg>
      </div>
      <div>
        <div class="logo-text">Administração</div>
        <div class="logo-sub">Preenchimento Semanal</div>
      </div>
    </div>
    <a href="dashboard.html" class="nav-link">← Ver Dashboard</a>
  </header>

  <!-- ============================================================
       CONTEÚDO PRINCIPAL
  ============================================================ -->
  <main class="main-content">

    <!-- ---- Registros Salvos ---- -->
    <div class="card" style="margin-bottom:20px">
      <div class="section-header">
        <div class="section-num">★</div>
        <div class="section-title">Registros Salvos</div>
        <div class="section-sub" id="recordCount">carregando...</div>
      </div>
      <div class="records-list" id="recordsList">
        <div class="empty-records">
          <span class="spinner"></span> Carregando dados...
        </div>
      </div>
    </div>

    <!-- ---- Formulário de Preenchimento ---- -->
    <div class="card" id="formCard">

      <!-- Campo oculto para controle de edição -->
      <input type="hidden" id="editId">

      <!-- Banner de edição (aparece só quando editando) -->
      <div class="edit-banner" id="editBanner" style="display:none">
        <span id="editBannerText">Editando registro</span>
        <button onclick="clearForm()">Cancelar edição ✕</button>
      </div>

      <!-- ---- 1. PERÍODO ---- -->
      <div class="section-header">
        <div class="section-num">1</div>
        <div class="section-title">Período</div>
      </div>

      <div class="grid-2" style="margin-bottom:20px">
        <div class="field">
          <label for="fMes">Mês de Referência *</label>
          <input type="text" id="fMes" placeholder="Ex: Janeiro 2025">
        </div>
        <div class="field">
          <label for="fSemana">Semana de Referência</label>
          <select id="fSemana">
            <option value="1">Semana 1</option>
            <option value="2">Semana 2</option>
            <option value="3">Semana 3</option>
            <option value="4">Semana 4</option>
          </select>
        </div>
      </div>

      <div class="group-label">Datas de cada semana do mês</div>
      <div class="weeks-grid">
        <div class="week-row">
          <div class="week-row-title">Semana 1</div>
          <input type="text" id="fData1" placeholder="01/01 a 07/01">
        </div>
        <div class="week-row">
          <div class="week-row-title">Semana 2</div>
          <input type="text" id="fData2" placeholder="08/01 a 14/01">
        </div>
        <div class="week-row">
          <div class="week-row-title">Semana 3</div>
          <input type="text" id="fData3" placeholder="15/01 a 21/01">
        </div>
        <div class="week-row">
          <div class="week-row-title">Semana 4</div>
          <input type="text" id="fData4" placeholder="22/01 a 31/01">
        </div>
      </div>

      <div class="form-divider"></div>

      <!-- ---- 2. KPIs ---- -->
      <div class="section-header">
        <div class="section-num">2</div>
        <div class="section-title">KPIs Principais</div>
      </div>
      <div class="grid-4">
        <div class="field">
          <label for="fAtivacoes">Ativações</label>
          <input type="number" id="fAtivacoes" value="0" min="0" placeholder="0">
        </div>
        <div class="field">
          <label for="fCancelamentos">Cancelamentos</label>
          <input type="number" id="fCancelamentos" value="0" min="0" placeholder="0">
        </div>
        <div class="field">
          <label for="fPortabilidades">Portabilidades</label>
          <input type="number" id="fPortabilidades" value="0" min="0" placeholder="0">
        </div>
        <div class="field">
          <label for="fNovasLinhas">Novas Linhas</label>
          <input type="number" id="fNovasLinhas" value="0" min="0" placeholder="0">
        </div>
      </div>

      <div class="form-divider"></div>

      <!-- ---- 3. FORMAS DE PAGAMENTO ---- -->
      <div class="section-header">
        <div class="section-num">3</div>
        <div class="section-title">Formas de Pagamento</div>
      </div>
      <div class="grid-3">
        <div class="field">
          <label for="fPgCartao">Cartão</label>
          <input type="number" id="fPgCartao" value="0" min="0" placeholder="0">
        </div>
        <div class="field">
          <label for="fPgPix">Pix</label>
          <input type="number" id="fPgPix" value="0" min="0" placeholder="0">
        </div>
        <div class="field">
          <label for="fPgVoucher">Voucher</label>
          <input type="number" id="fPgVoucher" value="0" min="0" placeholder="0">
        </div>
      </div>

      <div class="form-divider"></div>

      <!-- ---- 4. STATUS DAS PORTABILIDADES ---- -->
      <div class="section-header">
        <div class="section-num">4</div>
        <div class="section-title">Status das Portabilidades</div>
      </div>
      <div class="grid-3">
        <div class="field">
          <label for="fPortAprovado">Aprovado</label>
          <input type="number" id="fPortAprovado" value="0" min="0" placeholder="0">
        </div>
        <div class="field">
          <label for="fPortAndamento">Em Andamento</label>
          <input type="number" id="fPortAndamento" value="0" min="0" placeholder="0">
        </div>
        <div class="field">
          <label for="fPortNegado">Negado</label>
          <input type="number" id="fPortNegado" value="0" min="0" placeholder="0">
        </div>
      </div>

      <div class="form-divider"></div>

      <!-- ---- 5. LOGÍSTICA ---- -->
      <div class="section-header">
        <div class="section-num">5</div>
        <div class="section-title">Logística</div>
      </div>
      <div class="grid-2">
        <div class="field">
          <label for="fLogAtivo">Ativos</label>
          <input type="number" id="fLogAtivo" value="0" min="0" placeholder="0">
        </div>
        <div class="field">
          <label for="fLogNaoAtivo">Não Ativos</label>
          <input type="number" id="fLogNaoAtivo" value="0" min="0" placeholder="0">
        </div>
      </div>

      <div class="form-divider"></div>

      <!-- ---- 6. TIPO DE CHIP ---- -->
      <div class="section-header">
        <div class="section-num">6</div>
        <div class="section-title">Tipo de Chip</div>
      </div>
      <div class="grid-2">
        <div class="field">
          <label for="fChipEsim">eSIM</label>
          <input type="number" id="fChipEsim" value="0" min="0" placeholder="0">
        </div>
        <div class="field">
          <label for="fChipFisico">Físico</label>
          <input type="number" id="fChipFisico" value="0" min="0" placeholder="0">
        </div>
      </div>

      <!-- ---- Botões ---- -->
      <div class="btn-row">
        <button class="btn btn-secondary" onclick="clearForm()">Limpar</button>
        <button class="btn btn-primary" id="btnSave" onclick="saveRecord()">
          💾 Salvar Dados
        </button>
      </div>

    </div>
    <!-- /formCard -->

  </main>

  <!-- Toast global -->
  <div class="toast" id="toast"></div>

  <!-- Scripts: dados compartilhados → lógica da tela -->
  <script src="data.js"></script>
  <script src="admin.js"></script>
</body>
</html>
