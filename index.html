<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Login — Dashboard Semanal</title>
  <link rel="stylesheet" href="shared.css">
  <style>
    body {
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      background: var(--bg);
      font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
    }

    .login-box {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 16px;
      padding: 40px;
      width: 100%;
      max-width: 400px;
      box-shadow: 0 24px 64px rgba(0,0,0,.4);
    }

    .login-logo {
      display: flex;
      align-items: center;
      gap: 12px;
      margin-bottom: 32px;
    }
    .login-logo-icon {
      width: 40px; height: 40px;
      background: linear-gradient(135deg, #10B981, #06B6D4);
      border-radius: 10px;
      display: flex; align-items: center; justify-content: center;
    }
    .login-logo-icon svg { width: 22px; height: 22px; fill: #fff; }
    .login-logo-text { font-size: 18px; font-weight: 700; }
    .login-logo-sub  { font-size: 12px; color: var(--muted); }

    .login-title {
      font-size: 22px; font-weight: 700;
      margin-bottom: 6px;
    }
    .login-sub {
      font-size: 13px; color: var(--muted);
      margin-bottom: 28px;
    }

    .field { display: flex; flex-direction: column; gap: 6px; margin-bottom: 16px; }
    .field label { font-size: 11px; color: var(--muted); font-weight: 600; text-transform: uppercase; letter-spacing: .5px; }
    .field input {
      background: var(--surface2);
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 12px 16px;
      color: var(--text);
      font-family: var(--font-body);
      font-size: 14px;
      outline: none;
      transition: border-color .2s;
      width: 100%;
    }
    .field input:focus { border-color: #10B981; }

    .btn-login {
      width: 100%;
      padding: 13px;
      background: #10B981;
      color: #fff;
      border: none;
      border-radius: 8px;
      font-family: var(--font-body);
      font-size: 15px; font-weight: 600;
      cursor: pointer;
      margin-top: 8px;
      transition: background .2s, transform .15s;
    }
    .btn-login:hover { background: #059669; transform: translateY(-1px); }
    .btn-login:disabled { opacity: .6; pointer-events: none; }

    .login-error {
      background: rgba(239,68,68,.1);
      border: 1px solid rgba(239,68,68,.3);
      border-radius: 8px;
      padding: 10px 14px;
      font-size: 13px;
      color: #fca5a5;
      margin-top: 14px;
      display: none;
    }
    .login-error.show { display: block; }
  </style>
</head>
<body>

  <div class="login-box">
    <div class="login-logo">
      <div class="login-logo-icon">
        <svg viewBox="0 0 24 24"><path d="M3 13h8V3H3v10zm0 8h8v-6H3v6zm10 0h8V11h-8v10zm0-18v6h8V3h-8z"/></svg>
      </div>
      <div>
        <div class="login-logo-text">Dashboard Semanal</div>
        <div class="login-logo-sub">Operações &amp; Métricas</div>
      </div>
    </div>

    <div class="login-title">Entrar</div>
    <div class="login-sub">Use seu e-mail e senha cadastrados no Firebase.</div>

    <div class="field">
      <label for="loginEmail">E-mail</label>
      <input type="email" id="loginEmail" placeholder="seu@email.com" autocomplete="email">
    </div>
    <div class="field">
      <label for="loginPassword">Senha</label>
      <input type="password" id="loginPassword" placeholder="••••••••" autocomplete="current-password">
    </div>

    <button class="btn-login" id="btnLogin" onclick="doLogin()">Entrar</button>
    <div class="login-error" id="loginError"></div>
  </div>

  <div class="toast" id="toast"></div>

  <script src="data.js"></script>
  <script>
    async function doLogin() {
      const email    = document.getElementById('loginEmail').value.trim();
      const password = document.getElementById('loginPassword').value;
      const btn      = document.getElementById('btnLogin');
      const errEl    = document.getElementById('loginError');

      errEl.classList.remove('show');

      if (!email || !password) {
        errEl.textContent = 'Preencha e-mail e senha.';
        errEl.classList.add('show');
        return;
      }

      btn.disabled    = true;
      btn.textContent = 'Entrando...';

      try {
        await DS.login(email, password);
        // Seta flag e redireciona manualmente
        sessionStorage.setItem('loginOk', '1');
        const dest = sessionStorage.getItem('loginDest') || 'admin.html';
        sessionStorage.removeItem('loginDest');
        window.location.href = dest;
      } catch (e) {
        btn.disabled    = false;
        btn.textContent = 'Entrar';
        const msg = e.code === 'auth/invalid-credential' || e.code === 'auth/wrong-password'
          ? 'E-mail ou senha incorretos.'
          : e.code === 'auth/user-not-found'
          ? 'Usuário não encontrado.'
          : e.code === 'auth/too-many-requests'
          ? 'Muitas tentativas. Aguarde e tente novamente.'
          : 'Erro ao entrar: ' + e.message;
        errEl.textContent = msg;
        errEl.classList.add('show');
      }
    }

    // Login ao pressionar Enter
    document.addEventListener('keydown', e => {
      if (e.key === 'Enter') doLogin();
    });
  </script>
</body>
</html>
